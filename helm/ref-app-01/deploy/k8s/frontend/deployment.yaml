apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: enterprise-frontend
  template:
    metadata:
      labels:
        app: enterprise-frontend
    spec:
      containers:
        - name: frontend
          image: enterprise-3tier-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
