apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-frontend
spec:
  replicas: 2
 
  selector:
    matchLabels:
      app: enterprise-frontend
  template:
    metadata:
      labels:
        app: enterprise-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: frontend
          image: ghcr.io/manojmenon/enterprise-3tier-frontend:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
