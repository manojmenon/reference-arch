apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ref-app-01
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/manojmenon/reference-arch.git
    targetRevision: main
    path: helm/ref-app-01
  destination:
    server: https://kubernetes.default.svc
    namespace: ref-app-01
  syncPolicy:
    automated:
      prune: true
      selfHeal: true